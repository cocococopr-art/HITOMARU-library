<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HITOMARU 図書館</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --white:#ffffff;
  --paper:#f7f7f5;
  --line:#e7e7e4;
  --ink:#3a3a3a;
  --ink-soft:#8a8a86;
  --red:#d3382c;
  --red-soft:#fdf1ef;
  --shadow:0 2px 4px rgba(0,0,0,.03),0 12px 28px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"Zen Kaku Gothic New",sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
}

/* ===== ヘッダー(細線・広字間のロゴ) ===== */
header{
  background:var(--white);
  border-bottom:1px solid var(--line);
  padding:64px 24px 44px;
  text-align:center;
}
.tagline{
  font-family:"Zen Maru Gothic",sans-serif;
  font-weight:300;
  font-size:12px;
  letter-spacing:.5em;
  color:var(--ink-soft);
  margin-bottom:18px;
}
.logo-en{
  font-family:"Zen Maru Gothic",sans-serif;
  font-weight:300;
  font-size:clamp(22px,4vw,34px);
  letter-spacing:.55em;
  text-indent:.55em;
  color:var(--ink);
}
.logo-ja{
  font-family:"Zen Maru Gothic",sans-serif;
  font-weight:300;
  font-size:clamp(34px,7vw,58px);
  letter-spacing:.35em;
  text-indent:.35em;
  margin-top:4px;
}
.logo-rule{
  width:56px;height:1px;background:var(--ink);
  margin:26px auto 0;opacity:.35;
}

/* ===== コントロール ===== */
.controls{
  max-width:1100px;margin:36px auto 0;padding:0 24px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;
}
.search{
  flex:1 1 260px;max-width:360px;
  background:var(--white);border:1px solid var(--line);border-radius:999px;
  padding:10px 20px;font-family:inherit;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.search:focus{border-color:var(--ink-soft)}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{
  font-family:"Zen Maru Gothic",sans-serif;font-weight:400;
  font-size:13px;letter-spacing:.12em;
  background:var(--white);border:1px solid var(--line);border-radius:999px;
  padding:7px 18px;cursor:pointer;color:var(--ink-soft);
  transition:all .2s;
}
.chip:hover{border-color:var(--ink-soft);color:var(--ink)}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--white)}
.chip.must{color:var(--red);border-color:#f0c9c4}
.chip.must.active{background:var(--red);border-color:var(--red);color:var(--white)}
.count{
  width:100%;text-align:center;margin-top:14px;
  font-size:12px;letter-spacing:.3em;color:var(--ink-soft);
}

/* ===== カードグリッド ===== */
.grid{
  max-width:1100px;margin:32px auto 90px;padding:0 24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;
}
.card{
  background:var(--white);border:1px solid var(--line);border-radius:14px;
  overflow:hidden;box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  transition:transform .25s,box-shadow .25s;
  opacity:0;transform:translateY(14px);
  animation:rise .5s forwards;
}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-4px);box-shadow:0 4px 8px rgba(0,0,0,.04),0 20px 40px rgba(0,0,0,.09)}
.card.must-read{border:1px solid var(--red)}
.cover{
  height:200px;background:var(--paper);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border-bottom:1px solid var(--line);position:relative;
}
.cover img{max-height:170px;max-width:80%;object-fit:contain;box-shadow:0 6px 16px rgba(0,0,0,.15)}
.cover .noimg{
  font-family:"Zen Maru Gothic",sans-serif;font-weight:300;
  letter-spacing:.4em;font-size:11px;color:var(--ink-soft);
}
.must-badge{
  position:absolute;top:10px;left:10px;
  background:var(--red);color:#fff;
  font-size:10px;letter-spacing:.25em;
  padding:4px 10px 4px 12px;border-radius:999px;
  font-family:"Zen Maru Gothic",sans-serif;
}
.body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:10px;flex:1}
.meta{display:flex;flex-wrap:wrap;gap:6px}
.cat{
  font-size:11px;letter-spacing:.15em;color:var(--ink-soft);
  border:1px solid var(--line);border-radius:999px;padding:2px 10px;
  background:var(--paper);
}
.card.must-read .cat{color:var(--red);border-color:#f0c9c4;background:var(--red-soft)}
.title{
  font-family:"Zen Maru Gothic",sans-serif;font-weight:500;
  font-size:16px;letter-spacing:.06em;line-height:1.5;
}
.point{font-size:13px;color:#5c5c58;flex:1}
.recommender{
  font-size:11.5px;letter-spacing:.1em;color:var(--ink-soft);
  border-top:1px dashed var(--line);padding-top:10px;
}
.recommender span{color:var(--ink)}
.link{
  display:inline-block;margin-top:2px;
  font-family:"Zen Maru Gothic",sans-serif;font-size:12px;letter-spacing:.25em;
  color:var(--ink);text-decoration:none;
  border-bottom:1px solid var(--ink);padding-bottom:2px;
  align-self:flex-start;transition:opacity .2s;
}
.link:hover{opacity:.5}
.card.must-read .link{color:var(--red);border-color:var(--red)}

/* ===== 状態表示 ===== */
.status{
  text-align:center;padding:80px 24px;color:var(--ink-soft);
  font-size:13px;letter-spacing:.3em;grid-column:1/-1;
}

footer{
  border-top:1px solid var(--line);background:var(--white);
  text-align:center;padding:32px 24px;
  font-family:"Zen Maru Gothic",sans-serif;font-weight:300;
  font-size:11px;letter-spacing:.4em;color:var(--ink-soft);
}

@media (prefers-reduced-motion:reduce){
  .card{animation:none;opacity:1;transform:none}
}

/* ===== スマホ最適化 ===== */
body{overflow-x:hidden}
.title,.point,.recommender{overflow-wrap:break-word;word-break:break-word}

@media (max-width:640px){
  header{padding:44px 16px 32px}
  .tagline{font-size:10px;letter-spacing:.35em}
  .logo-en{letter-spacing:.4em;text-indent:.4em}
  .logo-ja{letter-spacing:.25em;text-indent:.25em}

  .controls{padding:0 16px;gap:10px;margin-top:26px}
  .search{flex:1 1 100%;max-width:none;font-size:16px} /* 16px未満だとiOSでズームされるため */

  /* カテゴリーチップは横スクロールの1行に */
  .chips{
    flex-wrap:nowrap;justify-content:flex-start;
    width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding:4px 2px 8px;scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-size:12px;padding:7px 15px}

  /* 本棚らしい2列グリッド */
  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;padding:0 16px;margin:22px auto 64px;
  }
  .cover{height:150px}
  .cover img{max-height:126px;max-width:86%}
  .must-badge{top:8px;left:8px;font-size:9px;padding:3px 8px 3px 10px}
  .body{padding:12px 12px 14px;gap:8px}
  .title{font-size:13.5px}
  .point{font-size:11.5px;line-height:1.6}
  .cat{font-size:10px;padding:2px 8px}
  .recommender{font-size:10.5px;padding-top:8px}
  .link{font-size:11px;letter-spacing:.2em}
  .count{margin-top:6px}
  footer{padding:24px 16px;letter-spacing:.3em}
}

@media (max-width:340px){
  .grid{grid-template-columns:1fr}
  .cover{height:190px}
}
</style>
</head>
<body>

<header>
  <p class="tagline">本当に読むべき一冊と出会う</p>
  <div class="logo-en">HITOMARU</div>
  <div class="logo-ja">図 書 館</div>
  <div class="logo-rule"></div>
</header>

<div class="controls">
  <input class="search" id="search" type="search" placeholder="題名・おすすめした人で検索" aria-label="検索">
  <div class="chips" id="chips"></div>
  <p class="count" id="count"></p>
</div>

<main class="grid" id="grid">
  <p class="status">読み込み中 …</p>
</main>

<footer>HITOMARU LIBRARY</footer>

<script>
/* ====== 設定:公開したスプレッドシートのCSV URL ======
   「ウェブに公開」のURL末尾 /pubhtml を /pub?output=csv に変えたものです。
   シートを更新すると(自動再公開ONなら)ページも自動で最新になります。 */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSP1nykKgEMDTCrqPJUj3UGyDaThtDLQzJUy4qz4zKM-d9IzbuQHkq8xoy0yThAWojES72BTnkAgG5L/pub?output=csv";

let books = [];
let activeCat = "すべて";
let mustOnly = false;
let query = "";

/* --- CSVパーサ(引用符・改行対応) --- */
function parseCSV(text){
  const rows=[];let row=[],cell="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){row.push(cell);cell="";}
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&text[i+1]==='\n')i++;
        row.push(cell);cell="";
        if(row.some(v=>v.trim()!==""))rows.push(row);
        row=[];
      }else cell+=c;
    }
  }
  row.push(cell);
  if(row.some(v=>v.trim()!==""))rows.push(row);
  return rows;
}

/* --- 列名から自動でマッピング(列順が変わっても動く) --- */
function mapColumns(header){
  const find=(...keys)=>header.findIndex(h=>keys.some(k=>h.includes(k)));
  return {
    cover:find("表紙","画像"),
    title:find("題名","タイトル"),
    point:find("おすすめポイント","ポイント"),
    url:find("URL","リンク"),
    cat:find("カテゴリ"),
    person:find("おすすめした人","人"),
    must:find("必達")
  };
}

async function load(){
  const grid=document.getElementById("grid");
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error(res.status);
    const rows=parseCSV(await res.text());
    const col=mapColumns(rows[0]);
    books=rows.slice(1).map(r=>({
      cover:(r[col.cover]||"").trim(),
      title:(r[col.title]||"").trim(),
      point:(r[col.point]||"").trim(),
      url:(r[col.url]||"").trim(),
      cat:(r[col.cat]||"").trim()||"未分類",
      person:(r[col.person]||"").trim(),
      must:col.must>=0&&(r[col.must]||"").trim()!==""
    })).filter(b=>b.title);
    buildChips();
    render();
  }catch(e){
    grid.innerHTML='<p class="status">データを読み込めませんでした。スプレッドシートの「ウェブに公開」設定とURLをご確認ください。</p>';
    console.error(e);
  }
}

function buildChips(){
  const cats=["すべて",...new Set(books.map(b=>b.cat))];
  const box=document.getElementById("chips");
  box.innerHTML="";
  cats.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="chip"+(c===activeCat?" active":"");
    btn.textContent=c;
    btn.onclick=()=>{activeCat=c;buildChips();render();};
    box.appendChild(btn);
  });
  const must=document.createElement("button");
  must.className="chip must"+(mustOnly?" active":"");
  must.textContent="必達図書";
  must.onclick=()=>{mustOnly=!mustOnly;buildChips();render();};
  box.appendChild(must);
}

function render(){
  const grid=document.getElementById("grid");
  const list=books.filter(b=>
    (activeCat==="すべて"||b.cat===activeCat)&&
    (!mustOnly||b.must)&&
    (query===""||b.title.includes(query)||b.person.includes(query)||b.point.includes(query))
  );
  document.getElementById("count").textContent=`${list.length} 冊`;
  if(list.length===0){
    grid.innerHTML='<p class="status">該当する本がありません</p>';
    return;
  }
  grid.innerHTML="";
  list.forEach((b,i)=>{
    const card=document.createElement("article");
    card.className="card"+(b.must?" must-read":"");
    card.style.animationDelay=(i*40)+"ms";
    card.innerHTML=`
      <div class="cover">
        ${b.must?'<span class="must-badge">必達図書</span>':""}
        ${b.cover?`<img src="${esc(b.cover)}" alt="${esc(b.title)} の表紙" loading="lazy" onerror="this.outerHTML='<span class=noimg>NO IMAGE</span>'">`:'<span class="noimg">NO IMAGE</span>'}
      </div>
      <div class="body">
        <div class="meta"><span class="cat">${esc(b.cat)}</span></div>
        <h2 class="title">${esc(b.title)}</h2>
        ${b.point?`<p class="point">${esc(b.point)}</p>`:""}
        ${b.person?`<p class="recommender">おすすめした人 / <span>${esc(b.person)}</span></p>`:""}
        ${b.url?`<a class="link" href="${esc(b.url)}" target="_blank" rel="noopener">本を見る →</a>`:""}
      </div>`;
    grid.appendChild(card);
  });
}

function esc(s){return s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}

document.getElementById("search").addEventListener("input",e=>{
  query=e.target.value.trim();render();
});

load();
</script>
</body>
</html>
